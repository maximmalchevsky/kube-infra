victoria-metrics-single:
  rbac:
    create: false
    pspEnabled: false
  serviceAccount:
    create: false
  server:
    priorityClassName: "low-priority"
    retentionPeriod: 7d
    extraArgs:
      selfScrapeInterval: "15s"
      loggerLevel: "INFO"
    persistentVolume:
      storageClassName: "nfs-client"
      size: "10Gi"
    resources:
      requests:
        cpu: 200m
        memory: 500Mi
      limits:
        cpu: "1"
        memory: 2Gi
    ingress:
      enabled: true
      annotations:
        certmanager.k8s.io/cluster-issuer: dev-ca-issuer
      hosts:
        - name: "vm.maxim.local"
          path: /
          port: 9090
      tls:
        - secretName: "vm-tls"
          hosts:
            - vm.maxim.local
      ingressClassName: traefik
    statefulSet:
      enabled: true
      podManagementPolicy: Parallel
    scrape:
      enabled: false
