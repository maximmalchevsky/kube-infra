alertmanager:
  nameOverride: "alertmanger"
  fullnameOverride: "alertmanger"

  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
      - host: am.maxim.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - am.maxim.local
        secretName: alertmanager-tls


  resources:
    limits:
      cpu: 100m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 32Mi

  persistence:
    enabled: true

    storageClass: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 50Mi

  config:
    global:
      resolve_timeout: 5m