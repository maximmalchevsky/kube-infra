

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: monitoring
    app.kubernetes.io/name: victoria-metrics-alert
    app.kubernetes.io/version: v1.148.0

spec:
  minReadySeconds: 0
  replicas: 1
  selector:
    matchLabels:
      app: server
      app.kubernetes.io/instance: monitoring
      app.kubernetes.io/name: victoria-metrics-alert
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: server
        app.kubernetes.io/component: server
        app.kubernetes.io/instance: monitoring
        app.kubernetes.io/name: victoria-metrics-alert
    spec:
      serviceAccountName: monitoring-victoria-metrics-alert
      automountServiceAccountToken: true
      securityContext:
        {}
      containers:
        - name: vmalert
          securityContext:
            {}
          image: victoriametrics/vmalert:v1.148.0
          args:
            - --datasource.url=http://victoriametrics-victoria-metrics-single-server:8428
            - --envflag.enable
            - --envflag.prefix=VM_
            - --httpListenAddr=:8880
            - --loggerFormat=json
            - --notifier.url=http://alertmanager:9093
            - --rule=/config/*.yaml
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8880
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 5
            periodSeconds: 15
            tcpSocket:
              port: http
            timeoutSeconds: 5
          volumeMounts:
            - name: alerts-config-cpu
              mountPath: /config

          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
      priorityClassName: low-priority
      volumes:
        - name: alerts-config-cpu
          configMap:
            name: vmalert-rules-config-cpu